<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Fusion – July Go-Live Countdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 2rem 1.5rem 1.75rem;
    position: relative;
    overflow: hidden;
    max-width: 520px;
    width: 100%;
  }

  #stars-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #0C447C;
    border-radius: 50%;
    animation: twinkle 2s infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(1.05); }
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    z-index: 1;
  }

  .eyebrow span {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #185FA5;
    font-weight: 600;
  }

  .star-dot {
    width: 7px;
    height: 7px;
    background: #378ADD;
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    flex-shrink: 0;
  }

  .logo-area {
    margin-bottom: 16px;
    z-index: 1;
  }

  .headline {
    font-size: 21px;
    font-weight: 600;
    color: #042C53;
    text-align: center;
    line-height: 1.3;
    z-index: 1;
    margin-bottom: 4px;
  }

  .subline {
    font-size: 13px;
    color: #185FA5;
    text-align: center;
    z-index: 1;
  }

  .clock-wrap {
    position: relative;
    margin: 20px 0 8px;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse1, .pulse2 {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  .pulse1 {
    inset: -18px;
    border: 1.5px solid #B5D4F4;
    animation: pulse-ring 3s ease-in-out infinite;
  }

  .pulse2 {
    inset: -10px;
    border: 1px solid #E6F1FB;
    animation: pulse-ring 3s ease-in-out infinite 0.6s;
  }

  .units {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 22px;
    z-index: 1;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .num {
    font-size: 48px;
    font-weight: 600;
    color: #042C53;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    background: #E6F1FB;
    border: 1px solid #B5D4F4;
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 76px;
    text-align: center;
    letter-spacing: -1px;
  }

  .lbl {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #185FA5;
    font-weight: 600;
  }

  .sep {
    font-size: 40px;
    font-weight: 300;
    color: #378ADD;
    margin-bottom: 18px;
    line-height: 1;
  }

  .footer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    z-index: 1;
  }

  .footer-row span {
    font-size: 12px;
    color: #185FA5;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="wrap">

  <div id="stars-bg"></div>

  <div class="eyebrow">
    <div class="star-dot"></div>
    <span>CBS &amp; Corporate are now live</span>
    <div class="star-dot"></div>
  </div>

  <div class="headline">July Go-Live Countdown</div>
  <div class="subline" style="margin-bottom:0;">DTC &amp; Domestic Cable going live in Fusion</div>

  <div class="clock-wrap">
    <div class="pulse1"></div>
    <div class="pulse2"></div>
    <svg id="clk" width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="55" cy="55" r="52" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="1.5"/>
      <circle cx="55" cy="55" r="46" fill="none" stroke="#B5D4F4" stroke-width="0.5"/>
      <g id="ticks"></g>
      <line id="hh" x1="55" y1="55" x2="55" y2="26" stroke="#042C53" stroke-width="3.5" stroke-linecap="round"/>
      <line id="mh" x1="55" y1="55" x2="55" y2="18" stroke="#042C53" stroke-width="2.5" stroke-linecap="round"/>
      <line id="sh" x1="55" y1="62" x2="55" y2="13" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="55" cy="55" r="4" fill="#042C53"/>
      <circle cx="55" cy="55" r="2" fill="#378ADD"/>
    </svg>
  </div>

  <div class="units">
    <div class="unit"><div class="num" id="d">--</div><div class="lbl">days</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="h">--</div><div class="lbl">hours</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="m">--</div><div class="lbl">min</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="s">--</div><div class="lbl">sec</div></div>
  </div>

  <div class="footer-row">
    <div class="star-dot"></div>
    <div class="star-dot"></div>
    <span>Go-live: July 1, 2026</span>
    <div class="star-dot"></div>
    <div class="star-dot"></div>
  </div>

</div>

<script>
  const sb = document.getElementById('stars-bg');
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = (Math.random() * 96 + 2) + '%';
    s.style.top = (Math.random() * 96 + 2) + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    sb.appendChild(s);
  }

  const tickG = document.getElementById('ticks');
  for (let i = 0; i < 60; i++) {
    const maj = i % 5 === 0;
    const r1 = maj ? 38 : 42;
    const r2 = 48;
    const a = (i / 60 * 360 - 90) * Math.PI / 180;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', 55 + r1 * Math.cos(a));
    ln.setAttribute('y1', 55 + r1 * Math.sin(a));
    ln.setAttribute('x2', 55 + r2 * Math.cos(a));
    ln.setAttribute('y2', 55 + r2 * Math.sin(a));
    ln.setAttribute('stroke', maj ? '#185FA5' : '#B5D4F4');
    ln.setAttribute('stroke-width', maj ? '1.5' : '0.75');
    tickG.appendChild(ln);
  }

  function rot(id, deg) {
    document.getElementById(id).setAttribute('transform', 'rotate(' + deg + ' 55 55)');
  }

  const TARGET = new Date('2026-07-01T00:00:00');

  function tick() {
    const now = new Date();
    const diff = Math.max(0, TARGET - now);
    const tot = Math.floor(diff / 1000);
    const days = Math.floor(tot / 86400);
    const hrs  = Math.floor((tot % 86400) / 3600);
    const mins = Math.floor((tot % 3600) / 60);
    const secs = tot % 60;

    document.getElementById('d').textContent = String(days).padStart(2, '0');
    document.getElementById('h').textContent = String(hrs).padStart(2, '0');
    document.getElementById('m').textContent = String(mins).padStart(2, '0');
    document.getElementById('s').textContent = String(secs).padStart(2, '0');

    const ns = now.getSeconds() + now.getMilliseconds() / 1000;
    const nm = now.getMinutes() + ns / 60;
    const nh = now.getHours() % 12 + nm / 60;

    rot('sh', ns / 60 * 360);
    rot('mh', nm / 60 * 360);
    rot('hh', nh / 12 * 360);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
